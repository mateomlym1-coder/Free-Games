<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Meme Soundboard</title>
    <!-- CrazyGames SDK v3 Integration -->
    <script src="https://crazygames.com"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { background: radial-gradient(circle, #ff007f 0%, #1a0033 100%); color: #ffffff; font-family: 'Impact', 'Arial Black', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; overflow-x: hidden; }
        #board-container { text-align: center; background: rgba(0, 0, 0, 0.6); padding: 30px; border-radius: 25px; box-shadow: 0 0 30px #ff007f; border: 3px solid #00ffcc; width: 100%; max-width: 500px; backdrop-filter: blur(5px); }
        h1 { font-size: 2.5rem; color: #00ffcc; text-shadow: 3px 3px #ff007f; letter-spacing: 2px; margin-bottom: 5px; text-transform: uppercase; }
        .subtitle { font-family: sans-serif; font-size: 0.9rem; color: #eee; margin-bottom: 25px; font-weight: bold; }
        .sound-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 25px; }
        .sound-btn { background: #fff; color: #000; border: 4px solid #000; padding: 20px 10px; font-size: 1.2rem; font-weight: bold; cursor: pointer; border-radius: 12px; box-shadow: 5px 5px 0px #00ffcc; transition: transform 0.05s, box-shadow 0.05s; display: flex; flex-direction: column; align-items: center; gap: 8px; text-transform: uppercase; }
        .sound-btn:active { transform: translate(3px, 3px); box-shadow: 2px 2px 0px #00ffcc; }
        .sound-btn:nth-child(1) { background: #ffeb3b; }
        .sound-btn:nth-child(2) { background: #ff5722; color: #fff; }
        .sound-btn:nth-child(3) { background: #4caf50; color: #fff; }
        .sound-btn:nth-child(4) { background: #00bcd4; color: #fff; }
        .sound-btn span { font-size: 2.2rem; }
        .btn-panel { display: flex; flex-direction: column; gap: 10px; }
        button.action-btn { width: 100%; padding: 14px; font-size: 1.1rem; font-weight: bold; color: #fff; border: none; border-radius: 10px; cursor: pointer; text-transform: uppercase; font-family: sans-serif; }
        #ad-btn { background: #9c27b0; box-shadow: 0 4px 15px rgba(156, 39, 176, 0.4); border: 2px solid #e040fb; }
        #ad-btn:disabled { background: #444; border: none; cursor: not-allowed; opacity: 0.5; box-shadow: none; }
        #stop-btn { background: #ff3333; font-size: 0.9rem; padding: 8px; border: 2px solid #ff8888; margin-top: 5px; }
        #status-msg { margin-top: 15px; font-family: sans-serif; font-size: 0.85rem; color: #00ffcc; min-height: 18px; letter-spacing: 0.5px; }
    </style>
</head>
<body>

    <div id="board-container">
        <h1>MEME BOARD</h1>
        <div class="subtitle">CrazyGames Audio Edition</div>
        
        <div class="sound-grid">
            <button class="sound-btn" data-sound="vine-boom">
                <span>💥</span>VINE BOOM
            </button>
            <button class="sound-btn" data-sound="bruh">
                <span>💀</span>BRUH
            </button>
            <button class="sound-btn" data-sound="airhorn">
                <span>📢</span>AIRHORN
            </button>
            <button class="sound-btn" data-sound="sad-violin">
                <span>🎻</span>SAD VIOLIN
            </button>
        </div>
        
        <div class="btn-panel">
            <button id="ad-btn" class="action-btn">🎬 Watch Ad to Unlock Secret Meme Sound</button>
            <button id="stop-btn" class="action-btn">🚨 STOP ALL SOUNDS 🚨</button>
        </div>

        <div id="status-msg">Initializing Audio Systems...</div>
    </div>

    <script>
        let crazySDK = null;
        let secretUnlocked = false;

        // Web Audio API Synthesis Engine (No external resource dependencies)
        const AudioEngine = {
            ctx: null,
            activeNodes: [],

            init() {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            },

            play(type) {
                if (!this.ctx) this.init();
                if (this.ctx.state === 'suspended') this.ctx.resume();

                const now = this.ctx.currentTime;

                if (type === 'vine-boom') {
                    // Deep booming impact drop synth
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.exponentialRampToValueAtTime(40, now + 0.4);
                    gain.gain.setValueAtTime(0.8, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.start(now);
                    osc.stop(now + 0.5);
                    this.activeNodes.push(osc);
                } 
                else if (type === 'bruh') {
                    // Low pitch grunt emulation square wave pulse
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(85, now);
                    osc.frequency.linearRampToValueAtTime(70, now + 0.25);
                    gain.gain.setValueAtTime(0.5, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.start(now);
                    osc.stop(now + 0.3);
                    this.activeNodes.push(osc);
                } 
                else if (type === 'airhorn') {
                    // Piercing multi-oscillator stacked frequency blast
                    for(let i = 0; i < 3; i++) {
                        const osc = this.ctx.createOscillator();
                        const gain = this.ctx.createGain();
                        osc.type = 'sawtooth';
                        osc.frequency.setValueAtTime(350 + (i * 4), now);
                        // Frequency modulation stutter
                        osc.frequency.linearRampToValueAtTime(360, now + 0.1);
                        osc.frequency.linearRampToValueAtTime(340, now + 0.2);
                        gain.gain.setValueAtTime(0.2, now);
                        gain.gain.setValueAtTime(0.2, now + 0.4);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                        osc.connect(gain);
                        gain.connect(this.ctx.destination);
                        osc.start(now);
                        osc.stop(now + 0.5);
                        this.activeNodes.push(osc);
                    }
                } 
                else if (type === 'sad-violin') {
                    // Sustained high sine vibrato frequency sweep
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(440, now);
                    // Add manual quick pitch vibrato wave
                    for(let t = 0; t < 12; t++) {
                        osc.frequency.linearRampToValueAtTime(440 + (t%2===0 ? 8 : -8), now + (t * 0.1));
                    }
                    gain.gain.setValueAtTime(0.4, now);
                    gain.gain.linearRampToValueAtTime(0.3, now + 1.0);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 1.2);
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.start(now);
                    osc.stop(now + 1.2);
                    this.activeNodes.push(osc);
                }
                else if (type === 'secret') {
                    // Laser beams space explosion meme reward track
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(800, now);
                    osc.frequency.exponentialRampToValueAtTime(100, now + 0.8);
                    gain.gain.setValueAtTime(0.6, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.8);
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.start(now);
                    osc.stop(now + 0.8);
                    this.activeNodes.push(osc);
                }
            },

            stopAll() {
                this.activeNodes.forEach(node => { try { node.stop(); } catch(e){} });
                this.activeNodes = [];
            }
        };

        // DOM Element Mapping Reference Lookups
        const statusMsg = document.getElementById('status-msg');
        const adBtn = document.getElementById('ad-btn');
        const stopBtn = document.getElementById('stop-btn');
        const soundButtons = document.querySelectorAll('.sound-grid .sound-btn');

        // Initialize Portal Communication Infrastructure Bridge
        window.addEventListener('DOMContentLoaded', () => {
            if (window.CrazyGames && window.CrazyGames.SDK) {
                try {
                    crazySDK = window.CrazyGames.SDK;
                    statusMsg.innerText = "CrazyGames Portal Verified. Audio Ready!";
                    crazySDK.game.loadingStop();
                } catch (e) {
                    statusMsg.innerText = "Running Standalone Soundboard.";
                }
            } else {
                statusMsg.innerText = "Running Standalone Soundboard.";.}});// Event Triggers for Audio Grid Array BlockssoundButtons.forEach(btn => {btn.addEventListener('click', () => {const soundType = btn.getAttribute('data-sound');AudioEngine.play(soundType);if (crazySDK) {crazySDK.game.gameplayStart();}});});// Ad Delivery Target Hook for Rewarded Secret ActionadBtn.addEventListener('click', () => {if (secretUnlocked) {AudioEngine.play('secret');return;}statusMsg.innerText = "Loading Ad for Secret Meme Unlocking...";adBtn.disabled = true;if (crazySDK) {crazySDK.ad.requestAd("rewarded", {adStarted: () => { statusMsg.innerText = "Meme Ad streaming..."; },adFinished: () => { unlockSecretMeme(); },adError: (err) => {adBtn.disabled = false;statusMsg.innerText = "Ad system failed. Unlocking anyway for fun!";unlockSecretMeme();}});} else {// Standalone Sandbox Timeout Simulation Fallback EnginesetTimeout(() => { unlockSecretMeme(); }, 1200);}});function unlockSecretMeme() {secretUnlocked = true;adBtn.disabled = false;adBtn.style.background = "#00ffcc";adBtn.style.color = "#000";adBtn.style.border = "2px solid #fff";adBtn.innerText = "🔊 PLAY SECRET MEME BEAM";statusMsg.innerText = "Unleashed Secret Extra Laser Sound Item!";AudioEngine.play('secret');}// Global Panic Audio Kill Switch ActionstopBtn.addEventListener('click', () => {AudioEngine.stopAll();statusMsg.innerText = "All active audio waves terminated.";});
